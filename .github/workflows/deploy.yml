name: Generate and Deploy Docs

on:
  workflow_dispatch:
    inputs:
      files:
        description: "Space-separated file stems to re-run (e.g. multi_file_queue story_coverage_mocked). Leave blank to run all."
        required: false
        default: ""
      limit:
        description: "Cap the number of files processed (for smoke testing). Leave blank for no limit."
        required: false
        default: ""
      rebuild_only:
        description: "Skip generate entirely and just rebuild + deploy from existing cache. Set to 'true'."
        required: false
        default: ""
  repository_dispatch:
    types: [tests-updated]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout shiftdoc-docs
        uses: actions/checkout@v4

      - name: Checkout shiftdoc-tests
        uses: actions/checkout@v4
        with:
          repository: AdamSteir/shiftdoc-tests
          path: shiftdoc-tests
          token: ${{ secrets.SHIFTDOC_DOCS_DISPATCH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate cache
        if: github.event.inputs.rebuild_only != 'true'
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            FILES="${{ github.event.client_payload.files }}"
            if [ -n "$FILES" ]; then
              python generate.py shiftdoc-tests/features --files $FILES --cache-dir _cache/
            else
              echo "No files to generate (deletions only) -- skipping"
            fi
          elif [ -n "${{ github.event.inputs.files }}" ]; then
            python generate.py shiftdoc-tests/features --files ${{ github.event.inputs.files }} --cache-dir _cache/
          elif [ -n "${{ github.event.inputs.limit }}" ]; then
            python generate.py shiftdoc-tests/features --limit ${{ github.event.inputs.limit }} --cache-dir _cache/
          else
            python generate.py shiftdoc-tests/features --cache-dir _cache/
          fi

      - name: Reconcile cache
        if: github.event_name == 'repository_dispatch'
        run: python reconcile.py --cache-dir _cache/ --features-dir shiftdoc-tests/features

      - name: Commit cache changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A _cache/
          if ! git diff --staged --quiet; then
            git commit -m "Update cache [skip ci]"
            git push
          fi

      - name: Build site
        run: python build.py --cache-dir _cache/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          branch: gh-pages
